name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            target: ""
          - platform: windows-latest
            args: ""
            target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: __VERSION__
          releaseName: "TubeSaver __VERSION__"
          releaseBody: |
            ## インストール方法

            ### macOS
            1. `.dmg` をダウンロードして開く
            2. `TubeSaver.app` を `Applications` にドラッグ
            3. **初回起動前に**ターミナルで以下を実行:
            ```
            xattr -cr /Applications/TubeSaver.app
            ```
            4. TubeSaverを起動（初回はyt-dlp/ffmpegの自動ダウンロードに少し時間がかかります）

            ### Windows
            - `.msi` または `.exe` をダウンロードしてインストール
            - SmartScreen警告が出た場合:「詳細情報」→「実行」

            ### Linux
            - `.deb`: `sudo dpkg -i tubesaver_*.deb`
            - `.AppImage`: `chmod +x TubeSaver_*.AppImage && ./TubeSaver_*.AppImage`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
